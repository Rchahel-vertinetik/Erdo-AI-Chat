<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vertinetik AI Chatbot</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="chatbox">
      <!-- Input at top -->
      <div class="input-area">
        <textarea
          id="userInput"
          placeholder="Type your message..."
          onkeydown="handleKeyPress(event)"
          rows="2"
        ></textarea>

        <div class="split-button">
          <button onclick="sendTask()">Send</button>
          <div class="dropdown">
            <button class="dropbtn">▼</button>
            <div class="dropdown-content">
              <button onclick="clearChat()">🧹 Clear Chat</button>
              <button onclick="sendClearMap()">🗺️❌ Clear Map</button>
              <label class="dropdown-toggle-row" for="betaToggle">
                <span>🧪 Activate Beta</span>
                <input type="checkbox" id="betaToggle" onchange="handleBetaToggle(event)">
              </label>
            </div>
          </div>
        </div>
      </div>

      <!-- Messages in center -->
      <div class="env-banner" id="envBanner" hidden>
        Beta is active
      </div>
      <div id="messages"></div>

      <!-- Suggestions toggle button -->
<div class="suggestions-toolbar">
  <div id="toggleSuggestions" class="suggestions-toggle-icon">× Hide</div>
</div>


      <!-- Suggestions area -->
      <div id="suggestions" class="suggestions"></div>
    </div>
  </div>

  <!-- Sticky footer disclaimer -->
  <div id="disclaimer">
    Some interactions may be logged to help us improve your experience.
  </div>

  <script src="script.js"></script>
</body>
</html>
